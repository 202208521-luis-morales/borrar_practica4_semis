<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Análisis de Sentimiento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f8f9fa; }
    .result-card { display: none; }
    .sentiment-badge {
      font-size: 1.5rem;
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
    }
    .bar-label { font-size: 0.8rem; color: #6c757d; }
  </style>
</head>
<body>
  <div class="container py-5" style="max-width: 680px;">
    <h1 class="mb-1 fw-semibold">Análisis de Sentimiento</h1>
    <h2 class="mb-1 fw-semibold">Práctica 4 - Grupo 4</h2>
    <p class="text-muted mb-4">Ingresa un comentario para detectar su sentimiento con Amazon Comprehend.</p>

    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body p-4">
        <label for="textInput" class="form-label fw-medium">Texto a analizar</label>
        <textarea
          id="textInput"
          class="form-control mb-3"
          rows="4"
          placeholder="Escribe aquí el comentario del usuario..."
        ></textarea>
        <button id="analyzeBtn" class="btn btn-primary w-100" onclick="analyze()">
          Analizar sentimiento
        </button>
      </div>
    </div>

    <!-- Resultado -->
    <div id="resultCard" class="card shadow-sm border-0 result-card">
      <div class="card-body p-4">
        <h5 class="fw-semibold mb-3">Resultado</h5>
        <div class="text-center mb-4">
          <span id="sentimentBadge" class="sentiment-badge badge"></span>
        </div>

        <p class="fw-medium mb-2">Puntuaciones de confianza</p>
        <div id="scoresContainer"></div>
      </div>
    </div>

    <!-- Error -->
    <div id="errorAlert" class="alert alert-danger d-none mt-3" role="alert"></div>
  </div>

  <script>
    const API_URL = "https://pcpo9hhj08.execute-api.us-east-1.amazonaws.com/prod/sentiment";

    const LABELS = {
      POSITIVE: { label: "Positivo 😊",  color: "success" },
      NEGATIVE: { label: "Negativo 😞",  color: "danger"  },
      NEUTRAL:  { label: "Neutral 😐",   color: "secondary"},
      MIXED:    { label: "Mezclado 🤔",  color: "warning" },
    };

    async function analyze() {
      const text = document.getElementById("textInput").value.trim();
      const btn  = document.getElementById("analyzeBtn");
      const errorAlert = document.getElementById("errorAlert");
      errorAlert.classList.add("d-none");

      if (!text) {
        showError("Por favor ingresa un texto para analizar.");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Analizando...';

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Error desconocido");

        showResult(data);
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = "Analizar sentimiento";
      }
    }

    function showResult({ sentiment, scores }) {
      const info = LABELS[sentiment] || { label: sentiment, color: "secondary" };
      const badge = document.getElementById("sentimentBadge");
      badge.className = `sentiment-badge badge bg-${info.color}`;
      badge.textContent = info.label;

      const container = document.getElementById("scoresContainer");
      container.innerHTML = "";

      const order = ["Positive", "Negative", "Neutral", "Mixed"];
      order.forEach((key) => {
        const val = scores[key] ?? 0;
        const pct = (val * 100).toFixed(1);
        const colorMap = { Positive:"success", Negative:"danger", Neutral:"secondary", Mixed:"warning" };
        container.innerHTML += `
          <div class="mb-2">
            <div class="d-flex justify-content-between bar-label mb-1">
              <span>${key}</span><span>${pct}%</span>
            </div>
            <div class="progress" style="height:10px;">
              <div class="progress-bar bg-${colorMap[key]}"
                   style="width:${pct}%" role="progressbar"></div>
            </div>
          </div>`;
      });

      document.getElementById("resultCard").style.display = "block";
    }

    function showError(msg) {
      const el = document.getElementById("errorAlert");
      el.textContent = msg;
      el.classList.remove("d-none");
    }

    // Enter para analizar
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && e.ctrlKey) analyze();
    });
  </script>
</body>
</html>
